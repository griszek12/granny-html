<!DOCTYPE html>

<!-- Granny Game - Auto Continue by Faking Ad Complete -->

<html lang="en-us">
<head>
    <title>Granny Original</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/bubbls/granny@212c543a85b243c4a0b92211f557e760d83d2292/TemplateData/style.css">
    <script src="https://cdn.jsdelivr.net/gh/bubbls/granny@212c543a85b243c4a0b92211f557e760d83d2292/sdk.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: url('https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/background.png') no-repeat center center fixed; background-size: cover; }
        #unity-container { position: absolute; width: 100%; height: 100%; left: 0; top: 0; }
        #unity-loading-bar { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 20px; background: rgba(0, 0, 0, 0.5); border: 2px solid #ffffff; border-radius: 10px; }
        #unity-progress-bar-full { position: absolute; top: 0; left: 0; width: 0%; height: 100%; background: #4caf50; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas" style="position: absolute; width: 100%; height: 100%"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-progress-bar-full"></div>
        </div>
    </div>
    <script>
        // Intercept SDK showRewarded - fake complete immediately
        YaGames.init().then(ysdk => {
            window.ysdk = ysdk;
            console.log("✅ SDK initialized");
            
            // Override showRewarded
            const originalShowRewarded = ysdk.ads.showRewarded;
            ysdk.ads.showRewarded = function(callbacks) {
                console.log("🎬 Fake ad - auto completing!");
                if (callbacks && callbacks.onOpen) callbacks.onOpen();
                if (callbacks && callbacks.onClose) callbacks.onClose(true);
                if (callbacks && callbacks.onRewarded) callbacks.onRewarded();
                return Promise.resolve();
            };
        }).catch(err => console.error("SDK error:", err));

        async function mergeUnityWebFiles(baseUrl, filePrefix, totalParts, extension) {
            const partUrls = [];
            for (let i = 1; i <= totalParts; i++) {
                partUrls.push(`${baseUrl}/${filePrefix}_part${i}.${extension}`);
            }
            const buffers = [];
            for (let i = 0; i < totalParts; i++) {
                const response = await fetch(partUrls[i]);
                if (!response.ok) throw new Error(`Failed: ${partUrls[i]}`);
                const buffer = await response.arrayBuffer();
                buffers.push(buffer);
                const progress = ((i + 1) / totalParts) * 100;
                document.querySelector("#unity-progress-bar-full").style.width = `${progress}%`;
            }
            const totalLength = buffers.reduce((acc, buffer) => acc + buffer.byteLength, 0);
            const combinedBuffer = new Uint8Array(totalLength);
            let offset = 0;
            buffers.forEach((buffer) => {
                combinedBuffer.set(new Uint8Array(buffer), offset);
                offset += buffer.byteLength;
            });
            return combinedBuffer;
        }

        let myGameInstance = null;
        const canvas = document.querySelector("#unity-canvas");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");

        async function initializeGame() {
            try {
                console.log("🎮 Ładowanie gry...");
                const dataBuffer = await mergeUnityWebFiles("https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/Build", "Granny", 2, "data");
                const wasmBuffer = await mergeUnityWebFiles("https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/Build", "Granny", 2, "wasm");
                const dataBlobUrl = URL.createObjectURL(new Blob([dataBuffer], { type: "application/octet-stream" }));
                const wasmBlobUrl = URL.createObjectURL(new Blob([wasmBuffer], { type: "application/octet-stream" }));

                var config = {
                    dataUrl: dataBlobUrl,
                    frameworkUrl: "https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/Build/Granny.framework.js",
                    codeUrl: wasmBlobUrl,
                    streamingAssetsUrl: "https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/StreamingAssets",
                    companyName: "Anastasia Kazantseva",
                    productName: "Granny",
                    productVersion: "1.0",
                };

                var script = document.createElement("script");
                script.src = "https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/Build/Granny.loader.js";
                script.onload = () => {
                    createUnityInstance(canvas, config, (progress) => {
                        progressBarFull.style.width = 100 * progress + "%";
                    }).then((unityInstance) => {
                        myGameInstance = unityInstance;
                        document.querySelector("#unity-loading-bar").style.display = "none";
                        console.log("✅ Gra załadowana!");
                    }).catch((message) => {
                        console.error("❌ Błąd:", message);
                    });
                };
                document.body.appendChild(script);
            } catch (error) {
                console.error("❌ Błąd inicjalizacji:", error);
            }
        }

        window.addEventListener('load', initializeGame);
    </script>
</body>
</html>
