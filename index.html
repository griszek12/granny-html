<!DOCTYPE html>

<html lang="en-us">
<head>
    <meta charset="utf-8"/>
    <title>Granny Original</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/bubbls/ruffle@895d0224580381ddd003fc2ab72afead3cf134ad/john.css"/>
</head>
<body>
    <div id="unity-container" style="position: absolute; width: 100%; height: 100%; left: 0%; top: 0%;">
        <canvas id="unity-canvas" style="position: absolute; width: 100%; height: 100%"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
    </div>

    <script>
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");

        async function mergeFiles(parts, onProgress) {
            let loaded = 0;
            const total = parts.length;
            const blobs = await Promise.all(parts.map(async (part) => {
                const res = await fetch(part);
                const blob = await res.blob();
                loaded++;
                if (onProgress) onProgress(loaded / total);
                return blob;
            }));
            return URL.createObjectURL(new Blob(blobs));
        }

        async function initializeGame() {
            var buildUrl = "https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/Build";
            var loaderUrl = buildUrl + "/Granny.loader.js";

            loadingBar.style.display = "block";

            var dataUrl = await mergeFiles([
                buildUrl + "/Granny_part1.data",
                buildUrl + "/Granny_part2.data"
            ], progress => {
                progressBarFull.style.width = (50 * progress) + "%";
            });

            var wasmUrl = await mergeFiles([
                buildUrl + "/Granny_part1.wasm",
                buildUrl + "/Granny_part2.wasm"
            ], progress => {
                progressBarFull.style.width = (50 + 50 * progress) + "%";
            });

            var config = {
                dataUrl: dataUrl,
                frameworkUrl: buildUrl + "/Granny.framework.js",
                codeUrl: wasmUrl,
                streamingAssetsUrl: buildUrl + "/StreamingAssets",
                companyName: "Anastasia Kazantseva",
                productName: "Granny",
                productVersion: "1.0",
            };

            var script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(canvas, config, (progress) => {
                    progressBarFull.style.width = (100 * progress) + "%";
                }).then((unityInstance) => {
                    setTimeout(() => {
                        loadingBar.style.display = "none";
                    }, 500);
                }).catch((message) => {
                    alert(message);
                });
            };
            document.body.appendChild(script);
        }

        initializeGame();
    </script>
</body>
</html>
